manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: hitsmaxft
      url-base: https://github.com/hitsmaxft
    - name: englmaxi
      url-base: https://github.com/englmaxi
    - name: urob
      url-base: https://github.com/urob
    - name: janpfischer
      url-base: https://github.com/janpfischer
  projects:
    - name: zmk
      remote: zmkfirmware
      revision: main
      clone-depth: 1
      import:
        file: app/west.yml
    - name: zmk-helpers
      remote: urob
      revision: main
      clone-depth: 1
    # zmk-rgbled-widget intentionally not included.
    # - hitsmaxft fork has a typeless `config WS2812_STRIP` (Kconfig:29) that
    #   collides with Zephyr's bool of the same name and breaks every build
    #   (including settings_reset) the moment it is on west.
    # - caksoylar upstream is GPIO-leds only and refuses to build without
    #   `led-red/green/blue` aliases pointing at a `gpio-leds` node, which
    #   Cornix does not have (WS2812 over SPI3 instead).
    # The RGB indicator will be implemented as a self-built out-of-tree module
    # driving led_strip directly. See issue #2 stage B.
    - name: zmk-dongle-display
      remote: englmaxi
      revision: main
      clone-depth: 1
    #- name: zmk-dongle-screen
    #  remote: janpfischer
    #  revision: main
    #  clone-depth: 1
  self:
    path: config

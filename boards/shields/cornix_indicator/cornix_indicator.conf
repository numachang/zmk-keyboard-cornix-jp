## WS2812 indicator driver (consumed by the stage-B self-built widget).
## In Zephyr 4.x the WS2812 strip is split per-bus; the SPI driver is
## what Cornix uses (see ws2812@0 under &spi3 in cornix.dtsi).
## WS2812_STRIP_SPI auto-enables when the DT has a status=okay
## worldsemi,ws2812-spi node and also selects SPI for us.
CONFIG_LED_STRIP=y
CONFIG_WS2812_STRIP_SPI=y
CONFIG_ZMK_EXT_POWER=y

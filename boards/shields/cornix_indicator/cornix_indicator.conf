## use ws2812-spi
CONFIG_SPI=y
CONFIG_WS2812_STRIP=y
CONFIG_LED_STRIP=y
CONFIG_ZMK_EXT_POWER=y

CONFIG_RGBLED_WIDGET=y
CONFIG_RGBLED_WIDGET_WS2812=y
CONFIG_RGBLED_WIDGET_LED_COUNT=2

# Low brightness for battery life (range 0-255)
CONFIG_RGBLED_WIDGET_BRIGHTNESS=64

# Spatial mapping: LED0 = battery, LED1 = connectivity (hitsmaxft defaults)
CONFIG_RGBLED_WIDGET_SPATIAL_MAPPING=y
CONFIG_RGBLED_WIDGET_LED_SHARING=y

# Show battery levels for both halves on the central
CONFIG_RGBLED_WIDGET_BATTERY_SHOW_PERIPHERALS=y

# Raise critical threshold from default 5% so warning is actionable
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_CRITICAL=20

# Recolor "peripheral disconnected / battery missing" from magenta to blue
# to match the RMK manual (青ゆっくり点滅 = 反対側ロスト)
# COLOR_BLUE = 4
CONFIG_RGBLED_WIDGET_BATTERY_COLOR_MISSING=4
